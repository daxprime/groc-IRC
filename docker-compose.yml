services:
  grocbot:
    image: ghcr.io/daxprime/groc-irc:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: groc-irc-bot
    restart: unless-stopped

    # Load secrets from .env file (copy from .env.example and fill in)
    env_file:
      - .env

    # Env overrides for container context
    environment:
      # Bridge must bind to 0.0.0.0 so Docker can forward port 5580
      BRIDGE_HOST: "0.0.0.0"

    ports:
      # HTTP bridge (only expose if Tcl bot or external tools need it)
      - "127.0.0.1:5580:5580"

    volumes:
      # Persist config changes (modes, custom settings)
      - ./config:/app/config
      # Persist logs
      - ./logs:/app/logs

    # Healthcheck: verify bridge server is responding
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5580/api/status')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
